; PlatformIO Configuration File para ESP32 WROOM-32 + PIR
; Usar con PlatformIO IDE o VS Code + PlatformIO extension

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Configuración del monitor serial
monitor_speed = 115200
monitor_filters = default, time

; Librerías requeridas
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.0

; Configuración de upload
upload_speed = 115200

; Opciones de compilación
build_flags = 
    -DCORE_DEBUG_LEVEL=3

; Puerto (cambiar según tu sistema)
; upload_port = COM3  ; Windows
; upload_port = /dev/ttyUSB0  ; Linux
; upload_port = /dev/cu.usbserial-*  ; Mac